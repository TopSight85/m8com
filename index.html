<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">Guia de Objeções</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d14;
    --surface: #16161f;
    --surface2: #1e1e2a;
    --border: #2a2a3a;
    --accent: #6366f1;
    --accent-light: #818cf8;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --green: #10b981;
    --amber: #f59e0b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-size: 15px;
    font-weight: 700;
    color: var(--accent-light);
    white-space: nowrap;
    letter-spacing: -0.3px;
  }

  .search-wrap { flex: 1; position: relative; }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 14px;
    pointer-events: none;
  }

  .search-bar {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px 9px 36px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--text-muted); }
  .search-bar:disabled { opacity: 0.4; cursor: not-allowed; }

  .filters {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .filter-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-right: 4px;
  }

  .filter-pill {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-pill:hover { border-color: var(--accent); color: var(--accent-light); }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .main {
    padding: 24px;
    max-width: 860px;
    margin: 0 auto;
  }

  .results-info {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 24px;
  }

  .results-info span {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-weight: 600;
    color: var(--text);
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    color: var(--text-muted);
    gap: 16px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 14px; }

  .error-state {
    background: rgba(244,63,94,0.08);
    border: 1px solid rgba(244,63,94,0.25);
    border-radius: 12px;
    padding: 28px;
    text-align: center;
    color: #fb7185;
  }

  .error-state .icon { font-size: 28px; margin-bottom: 10px; }
  .error-state p { font-size: 13px; line-height: 1.6; }
  .error-state code {
    font-size: 11px;
    background: rgba(0,0,0,0.3);
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 10px;
    word-break: break-all;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .card:hover { box-shadow: 0 8px 28px rgba(0,0,0,0.35); }

  .card-header {
    cursor: pointer;
    user-select: none;
    position: relative;
    padding: 22px 24px 20px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    overflow: hidden;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }

  .card-header:hover { background: #22222f; }

  .card-header::before {
    content: '\201C';
    font-family: 'Playfair Display', serif;
    font-size: 120px;
    line-height: 1;
    position: absolute;
    right: 16px;
    bottom: -28px;
    opacity: 0.04;
    color: #fff;
    pointer-events: none;
    user-select: none;
  }

  .quote-icon {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 1px;
    opacity: 0.9;
  }

  .card-header-content { flex: 1; min-width: 0; }

  .objecao-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 5px;
    opacity: 0.7;
  }

  .objecao-text {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.35;
    letter-spacing: -0.2px;
  }

  .chevron {
    color: var(--text-muted);
    font-size: 18px;
    transition: transform 0.25s;
    line-height: 1;
    flex-shrink: 0;
    margin-top: 4px;
  }

  .card.open .chevron { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }

  .card.open .card-body { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .quis-dizer-block {
    background: var(--surface2);
    border-radius: 8px;
    border-left: 3px solid var(--amber);
    padding: 12px 14px;
    margin-bottom: 16px;
  }

  .perfil-section { margin-bottom: 12px; }
  .perfil-section:last-child { margin-bottom: 0; }

  .perfil-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }

  .perfil-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .perfil-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  @media (max-width: 600px) {
    .info-grid { grid-template-columns: 1fr; }
    .main { padding: 16px; }
    .header { padding: 12px 16px; }
  }

  .info-block {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .info-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .info-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 500;
    padding: 2px 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent-light); }
  .copy-btn.copied { border-color: var(--green); color: var(--green); }

  .info-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
  }

  mark {
    background: rgba(245, 158, 11, 0.22);
    color: #fcd34d;
    border-radius: 3px;
    padding: 1px 4px;
    font-style: normal;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo" id="logoTitulo">⚡ Carregando...</div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-bar" id="searchInput"
           placeholder="Buscar objeção..." disabled>
  </div>
</div>

<div class="filters" id="filtersBar">
  <span class="filter-label">Perfil</span>
</div>

<div class="main">
  <div class="results-info" id="resultsInfo"></div>
  <div id="container">
    <div class="loading">
      <div class="spinner"></div>
      <p>Carregando dados...</p>
    </div>
  </div>
</div>

<script>

// ═══════════════════════════════════════════════════════
//  CONFIGURAÇÃO DO CLIENTE — edite apenas esta seção
// ═══════════════════════════════════════════════════════
const CONFIG = {
  titulo:        "Guia de Objeções | M8 Comunicação",
  sheets_config: "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdXg3UdrDe9xTLYljP2GNNEKywz_9CcSchI9JnWSizQklzr-uMvsCzW7JDkUWH8qVHOnGZGaYc0HW8/pub?gid=766132106&single=true&output=csv",
  sheets_dados:  "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdXg3UdrDe9xTLYljP2GNNEKywz_9CcSchI9JnWSizQklzr-uMvsCzW7JDkUWH8qVHOnGZGaYc0HW8/pub?gid=0&single=true&output=csv"
};
// ═══════════════════════════════════════════════════════


// ── STATE ──────────────────────────────────────────────
let perfilAtivo  = 'todos';
let busca        = '';
let perfisConfig = {};
let objecoes     = [];
const copyTexts  = {};


// ── UTILS ──────────────────────────────────────────────

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function isLightColor(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 150;
}

function stripHTML(html) {
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return (tmp.textContent || tmp.innerText || '').trim();
}

function parseCSV(text) {
  const rows    = [];
  let row       = [];
  let field     = '';
  let inQuotes  = false;

  for (let i = 0; i < text.length; i++) {
    const ch   = text[i];
    const next = text[i + 1];

    if (inQuotes) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"')            { inQuotes = false; }
      else                            { field += ch; }
    } else {
      if      (ch === '"')  { inQuotes = true; }
      else if (ch === ',')  { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || (ch === '\r' && next === '\n')) {
        if (ch === '\r') i++;
        row.push(field.trim());
        field = '';
        if (row.some(c => c !== '')) rows.push(row);
        row = [];
      } else { field += ch; }
    }
  }

  if (field || row.length > 0) {
    row.push(field.trim());
    if (row.some(c => c !== '')) rows.push(row);
  }

  return rows;
}

function csvToObjects(text) {
  const rows = parseCSV(text);
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.toLowerCase().trim());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => { obj[h] = row[i] ?? ''; });
    return obj;
  });
}


// ── FETCH ──────────────────────────────────────────────

async function fetchCSV(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.text();
}

async function loadData() {
  // Aba CONFIG
  const configRows = csvToObjects(await fetchCSV(CONFIG.sheets_config));
  configRows.forEach(row => {
    if (!row.perfil) return;
    const cor = row.cor || '#6366f1';
    perfisConfig[row.perfil] = {
      label:  row.label || row.perfil,
      cor,
      cor_bg: hexToRgba(cor, 0.15)
    };
  });

  // Aba DADOS — agrupa por id
  const dataRows = csvToObjects(await fetchCSV(CONFIG.sheets_dados));
  const map = {};
  dataRows.forEach(row => {
    if (!row.id) return;
    if (!map[row.id]) {
      map[row.id] = {
        id:         row.id,
        objecao:    row.objecao    || '',
        quis_dizer: row.quis_dizer || '',
        perfis:     {}
      };
    }
    if (row.perfil) {
      map[row.id].perfis[row.perfil] = {
        argumento:  row.argumento  || '',
        fechamento: row.fechamento || ''
      };
    }
  });

  objecoes = Object.values(map);
}


// ── FILTROS ────────────────────────────────────────────

function buildFilters() {
  const bar = document.getElementById('filtersBar');
  bar.innerHTML = '<span class="filter-label">Perfil</span>';

  const todos = document.createElement('button');
  todos.className      = 'filter-pill active';
  todos.dataset.perfil = 'todos';
  todos.textContent    = 'Todos';
  applyActivePillStyle(todos, '#6366f1');
  todos.addEventListener('click', () => setFiltro('todos', todos));
  bar.appendChild(todos);

  Object.entries(perfisConfig).forEach(([key, c]) => {
    const pill = document.createElement('button');
    pill.className      = 'filter-pill';
    pill.dataset.perfil = key;

    const dot = document.createElement('span');
    dot.className        = 'dot';
    dot.style.background = c.cor;

    pill.appendChild(dot);
    pill.appendChild(document.createTextNode(c.label));
    pill.addEventListener('click', () => setFiltro(key, pill));
    bar.appendChild(pill);
  });
}

function applyActivePillStyle(el, cor) {
  el.style.background  = cor;
  el.style.borderColor = cor;
  el.style.color       = isLightColor(cor) ? '#000' : '#fff';
}

function setFiltro(perfil, el) {
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.style.background  = '';
    p.style.borderColor = '';
    p.style.color       = '';
    p.classList.remove('active');
  });

  el.classList.add('active');
  const cor = perfil === 'todos'
    ? '#6366f1'
    : perfisConfig[perfil]?.cor || '#6366f1';
  applyActivePillStyle(el, cor);

  perfilAtivo = perfil;
  render();
}


// ── RENDER ─────────────────────────────────────────────

function render() {
  const container = document.getElementById('container');
  const infoEl    = document.getElementById('resultsInfo');

  const lista = objecoes.filter(o =>
    !busca ||
    o.objecao.toLowerCase().includes(busca) ||
    o.quis_dizer.toLowerCase().includes(busca)
  );

  if (!lista.length) {
    infoEl.innerHTML = '';
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🔍</div>
        <p>Nenhuma objeção encontrada.</p>
      </div>`;
    return;
  }

  const qtd = lista.length;
  infoEl.innerHTML =
    `<span>${qtd}</span> objeção${qtd !== 1 ? 'ões' : ''} encontrada${qtd !== 1 ? 's' : ''}`;

  const perfisParaMostrar = perfilAtivo === 'todos'
    ? Object.keys(perfisConfig)
    : [perfilAtivo];

  const headerAccent = perfilAtivo !== 'todos'
    ? (perfisConfig[perfilAtivo]?.cor || '#6366f1')
    : '#6366f1';

  container.innerHTML = lista.map(o => {

    const perfisHTML = perfisParaMostrar.map(p => {
      if (!o.perfis[p]) return '';
      const d   = o.perfis[p];
      const c   = perfisConfig[p];
      const keyArg = `${o.id}-${p}-arg`;
      const keyFec = `${o.id}-${p}-fec`;
      copyTexts[keyArg] = stripHTML(d.argumento);
      copyTexts[keyFec] = stripHTML(d.fechamento);

      const showBadge = perfisParaMostrar.length > 1;

      return `
        <div class="perfil-section">
          ${showBadge ? `
            <div class="perfil-header">
              <span class="perfil-badge"
                style="background:${c.cor_bg}; color:${c.cor}">
                ${c.label}
              </span>
              <div class="perfil-divider"></div>
            </div>` : ''}
          <div class="info-grid">
            <div class="info-block" style="border-left:3px solid ${c.cor}">
              <div class="info-block-header">
                <span class="info-label">💬 Argumento / Resposta</span>
                <button class="copy-btn" data-key="${keyArg}">copiar</button>
              </div>
              <div class="info-text">${d.argumento}</div>
            </div>
            <div class="info-block" style="border-left:3px solid var(--green)">
              <div class="info-block-header">
                <span class="info-label">🃏 Carta na Manga</span>
                <button class="copy-btn" data-key="${keyFec}">copiar</button>
              </div>
              <div class="info-text">${d.fechamento}</div>
            </div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="card open" id="card-${o.id}">
        <div class="card-header" data-id="${o.id}"
             style="border-left:4px solid ${headerAccent}">
          <span class="quote-icon" style="color:${headerAccent}">"</span>
          <div class="card-header-content">
            <div class="objecao-label" style="color:${headerAccent}">
              Objeção do cliente
            </div>
            <div class="objecao-text">${o.objecao}</div>
          </div>
          <span class="chevron">▾</span>
        </div>
        <div class="card-body">
          <div class="quis-dizer-block">
            <div class="info-label" style="margin-bottom:6px;">
              🧠 O que o cliente quis dizer
            </div>
            <div class="info-text">${o.quis_dizer}</div>
          </div>
          ${perfisHTML}
        </div>
      </div>`;
  }).join('');
}


// ── EVENTOS ────────────────────────────────────────────

document.getElementById('container').addEventListener('click', e => {
  const header = e.target.closest('.card-header');
  if (header) {
    document.getElementById(`card-${header.dataset.id}`)
            .classList.toggle('open');
    return;
  }
  const btn = e.target.closest('.copy-btn');
  if (btn) {
    const text = copyTexts[btn.dataset.key];
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓ copiado';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copiar';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
});

document.getElementById('searchInput').addEventListener('input', e => {
  busca = e.target.value.toLowerCase().trim();
  render();
});


// ── INIT ───────────────────────────────────────────────

async function init() {
  document.getElementById('logoTitulo').textContent = `⚡ ${CONFIG.titulo}`;
  document.title = CONFIG.titulo;

  try {
    await loadData();
    buildFilters();
    document.getElementById('searchInput').disabled = false;
    render();
  } catch (err) {
    document.getElementById('container').innerHTML = `
      <div class="error-state">
        <div class="icon">⚠️</div>
        <p>Não foi possível carregar os dados.<br>
           Verifique se as URLs do Google Sheets estão corretas
           e se a planilha está publicada na web.</p>
        <code>${err.message}</code>
      </div>`;
  }
}

init();

</script>
</body>
</html>
